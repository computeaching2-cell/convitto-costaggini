    <g stroke="#cda043" stroke-width="7" stroke-linecap="round"><line x1="0" y1="392" x2="-64" y2="446"/><line x1="0" y1="392" x2="64" y2="446"/><line x1="0" y1="392" x2="0" y2="452"/></g>
    <line class="hl" x1="-2" y1="80" x2="-2" y2="388"/>
