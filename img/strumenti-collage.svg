    <circle cx="0" cy="150" r="92" fill="none" stroke="#8a6a22" stroke-opacity=".6" stroke-width="3"/>
    <g fill="#f1dd92"><circle cx="0" cy="36" r="5.5"/><circle cx="84" cy="66" r="5.5"/><circle cx="84" cy="234" r="5.5"/><circle cx="-84" cy="66" r="5.5"/><circle cx="-84" cy="234" r="5.5"/><circle cx="0" cy="264" r="5.5"/></g>
