    <rect x="-19" y="-420" width="38" height="330" rx="8" fill="url(#gold)"/>
    <g class="det"><line x1="-19" y1="-150" x2="19" y2="-150"/><line x1="-19" y1="-190" x2="19" y2="-190"/><line x1="-19" y1="-230" x2="19" y2="-230"/><line x1="-19" y1="-270" x2="19" y2="-270"/><line x1="-19" y1="-310" x2="19" y2="-310"/><line x1="-19" y1="-350" x2="19" y2="-350"/><line x1="-19" y1="-390" x2="19" y2="-390"/></g>
    <g fill="#2a2009" fill-opacity=".5"><circle cx="0" cy="-210" r="3.5"/><circle cx="0" cy="-290" r="3.5"/><circle cx="0" cy="-370" r="3.5"/></g>
    <path d="M-24,-420 L24,-420 L31,-478 L37,-532 L8,-548 L-8,-532 Z" fill="url(#gold)" stroke="#7c5f1f" stroke-width="1.4"/>
    <g fill="#f6e3a0" stroke="#7c5f1f" stroke-width="1.2"><circle cx="-31" cy="-442" r="6.5"/><circle cx="-33" cy="-472" r="6.5"/><circle cx="-35" cy="-502" r="6.5"/><circle cx="33" cy="-442" r="6.5"/><circle cx="33" cy="-474" r="6.5"/><circle cx="31" cy="-506" r="6.5"/></g>
    <path d="M-100,-72 C-124,-112 -70,-136 -28,-114 C-10,-100 12,-100 30,-116
