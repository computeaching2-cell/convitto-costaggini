    <path d="M-150,8 C-196,8 -196,-44 -150,-44 L120,-44" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
    <path d="M120,-44 C150,-44 150,-12 132,4" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
    <path d="M-150,0 l-26,-6 0,20 26,-6 z" fill="url(#gold)" stroke="#7c5f1f" stroke-width="1.4"/>
    <g>
