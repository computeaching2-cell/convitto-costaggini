<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Collage elegante di strumenti musicali in oro su pentagramma: chitarra elettrica, tromba, batteria, piano elettrico e microfono">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#101c13"/>
      <stop offset="0.55" stop-color="#0a120c"/>
      <stop offset="1" stop-color="#060b07"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.6" cy="0.5" r="0.62">
      <stop offset="0" stop-color="#d8b24c" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#d8b24c" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#d8b24c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#fdf3cf"/>
      <stop offset="0.28" stop-color="#eccb72"/>
      <stop offset="0.6" stop-color="#c89a36"/>
      <stop offset="1"   stop-color="#876520"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbeec5"/>
      <stop offset="0.5" stop-color="#d4ab48"/>
      <stop offset="1" stop-color="#8a6a22"/>
    </linearGradient>
    <radialGradient id="brassBell" cx="0.35" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#fcf1ce"/>
      <stop offset="0.5" stop-color="#dcb255"/>
      <stop offset="1" stop-color="#7e5f1d"/>
    </radialGradient>
    <radialGradient id="cymbal" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#f6e3a0"/>
      <stop offset="0.55" stop-color="#cda043"/>
      <stop offset="1" stop-color="#8a6a22"/>
    </radialGradient>
    <filter id="glowSm" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <g id="spark">
      <path d="M0,-26 C3,-7 7,-3 26,0 C7,3 3,7 0,26 C-3,7 -7,3 -26,0 C-7,-3 -3,-7 0,-26 Z" fill="#fff7da" filter="url(#glowSm)"/>
      <path d="M0,-15 C2,-4 4,-2 15,0 C4,2 2,4 0,15 C-2,4 -4,2 -15,0 C-4,-2 -2,-4 0,-15 Z" fill="#ffffff"/>
      <path d="M0,-46 L1.4,-2 L0,46 L-1.4,-2 Z" fill="#fff7da" opacity="0.6" filter="url(#glowSm)"/>
      <path d="M-46,0 L-2,1.4 L46,0 L-2,-1.4 Z" fill="#fff7da" opacity="0.6" filter="url(#glowSm)"/>
    </g>
    <style>
      .det{fill:none;stroke:#2a2009;stroke-opacity:.55;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
      .hl{fill:none;stroke:#fff6d6;stroke-opacity:.55;stroke-width:1.6;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#halo)"/>

  <!-- PENTAGRAMMA + CHIAVE + NOTE -->
  <g stroke="#d8b24c" stroke-opacity="0.16" stroke-width="2" fill="none">
    <line x1="0" y1="560" x2="1600" y2="560"/><line x1="0" y1="592" x2="1600" y2="592"/>
    <line x1="0" y1="624" x2="1600" y2="624"/><line x1="0" y1="656" x2="1600" y2="656"/><line x1="0" y1="688" x2="1600" y2="688"/>
  </g>
  <g transform="translate(118,624)" fill="none" stroke="url(#goldV)" stroke-opacity="0.85" stroke-width="9" stroke-linecap="round">
    <path d="M6,84 C6,108 -30,108 -30,82 C-30,60 -2,56 10,74 C24,96 18,40 8,-2
             C-2,-44 2,-92 24,-110 C44,-126 56,-96 50,-70 C44,-44 14,-26 -18,-6
             C-44,10 -52,40 -38,60"/>
  </g>
  <g fill="#d8b24c" fill-opacity="0.5">
