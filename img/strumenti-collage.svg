      <rect x="-29" y="-12" width="12" height="32" rx="1.5"/><rect x="-8" y="-12" width="12" height="32" rx="1.5"/>
      <rect x="34" y="-12" width="12" height="32" rx="1.5"/><rect x="55" y="-12" width="12" height="32" rx="1.5"/><rect x="76" y="-12" width="12" height="32" rx="1.5"/>
      <rect x="118" y="-12" width="12" height="32" rx="1.5"/><rect x="139" y="-12" width="12" height="32" rx="1.5"/>
      <rect x="181" y="-12" width="12" height="32" rx="1.5"/><rect x="202" y="-12" width="12" height="32" rx="1.5"/><rect x="223" y="-12" width="12" height="32" rx="1.5"/>
