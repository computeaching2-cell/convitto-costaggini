      <rect x="22" y="-12" width="20.4" height="50" rx="2"/><rect x="43" y="-12" width="20.4" height="50" rx="2"/>
      <rect x="64" y="-12" width="20.4" height="50" rx="2"/><rect x="85" y="-12" width="20.4" height="50" rx="2"/>
      <rect x="106" y="-12" width="20.4" height="50" rx="2"/><rect x="127" y="-12" width="20.4" height="50" rx="2"/>
      <rect x="148" y="-12" width="20.4" height="50" rx="2"/><rect x="169" y="-12" width="20.4" height="50" rx="2"/>
      <rect x="190" y="-12" width="20.4" height="50" rx="2"/><rect x="211" y="-12" width="20.4" height="50" rx="2"/>
