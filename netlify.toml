# Configurazione Netlify — Convitto "Costaggini" — Rieti
# =====================================================

[build]
  publish = "."

# Notifiche email per ogni invio dei form
# Configurare dal pannello Netlify: Site settings → Forms → Notifications
# Aggiungere: rirh010007@istruzione.it

[[redirects]]
  from = "/grazie"
  to = "/grazie.html"
  status = 200

# Header di sicurezza
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
